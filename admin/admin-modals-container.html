<!-- Admin Modals Container - Forms in Grid -->
<div id="adminModalsOverlay" class="admin-modal-overlay" style="display: none;">
    <div class="admin-modals-grid">
        <!-- Add User Form -->
        <div id="addUserModal" class="admin-modal-content">
            <span class="close-modal" onclick="closeAdminModal('addUserModal')">&times;</span>
            <h2>Add New User</h2>
            <form id="addUserForm">
                <div class="form-group">
                    <label for="userName">Full Name</label>
                    <input type="text" id="userName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="userEmail">Email</label>
                    <input type="email" id="userEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label for="userPassword">Password</label>
                    <input type="password" id="userPassword" name="password" required>
                </div>
                <button type="submit" class="admin-form-btn">Add User</button>
            </form>
        </div>

        <!-- Add Product Form -->
        <div id="addProductModal" class="admin-modal-content">
            <span class="close-modal" onclick="closeAdminModal('addProductModal')">&times;</span>
            <h2>Add New Product</h2>
            <form id="addProductForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price (₱)</label>
                    <input type="number" id="productPrice" name="price" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="productCategory">Category</label>
                    <input type="text" id="productCategory" name="category" required>
                </div>
                <div class="form-group">
                    <label for="productStock">Stock Quantity</label>
                    <input type="number" id="productStock" name="stock" min="0" required>
                </div>
                <button type="submit" class="admin-form-btn">Add Product</button>
            </form>
        </div>
    </div>
</div>

<!-- Separate Input/Confirm Modals (Single overlay for prompts) -->

            <label id="inputModalLabel" for="inputModalField">Value</label>
            <input id="inputModalField" type="text" />
        </div>
        <div class="modal-actions">
            <button type="button" class="admin-form-btn secondary" id="inputModalCancel">Cancel</button>
            <button type="button" class="admin-form-btn" id="inputModalOk">OK</button>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="admin-modal-content admin-modal-single" style="display: none;">
        <span class="close-modal" onclick="closeConfirmModal()">&times;</span>
        <h2>Confirm</h2>
        <p id="confirmModalMessage"></p>
        <div class="modal-actions">
            <button type="button" class="admin-form-btn secondary" id="confirmModalCancel">Cancel</button>
            <button type="button" class="admin-form-btn" id="confirmModalOk">OK</button>
        </div>
    </div>
</div>
